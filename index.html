<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联合实验室双周重点成果文档智能统计工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 用于在前端直接生成真正的 Word 文档 -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background-color: #F7F8FA;
        }
        .panel {
            background-color: #FFFFFF;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            transition: border-color 0.2s;
        }
        .panel:hover {
            border-color: #CBD5E0;
        }
        .styled-textarea {
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            color: #111827;
            background-color: #FFFFFF;
            width: 100%;
            height: 100%;
            resize: none;
            outline: none;
            transition: border 0.2s;
            line-height: 1.5;
        }
        .styled-textarea:focus {
            border: 1px solid #2D8CF0;
        }
        .styled-textarea[readonly] {
            background-color: #FAFAFA;
        }
        .btn {
            height: 46px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            padding: 0 20px;
            color: white;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
            box-shadow: none;
        }
        .btn-blue { background-color: #2D8CF0; }
        .btn-blue:hover:not(:disabled) { background-color: #4B9EF5; }
        .btn-blue:active { background-color: #2676D0; padding: 2px 18px 0 22px; }
        
        .btn-green { background-color: #19BE6B; }
        .btn-green:hover:not(:disabled) { background-color: #29CC7B; }
        .btn-green:active { background-color: #149C57; padding: 2px 18px 0 22px; }

        .btn-purple { background-color: #805AD5; }
        .btn-purple:hover:not(:disabled) { background-color: #9371e0; }
        .btn-purple:active { background-color: #6d49c4; padding: 2px 18px 0 22px; }

        .btn-gray { background-color: #6B7280; }
        .btn-gray:hover:not(:disabled) { background-color: #7B8390; }
        .btn-gray:active { background-color: #5E6672; padding: 2px 18px 0 22px; }

        /* 滚动条样式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #F3F4F6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #C0C6CF; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #A0A6AF; }

        .line { height: 1px; background-color: #E2E8F0; }
    </style>
</head>
<body class="p-6 md:p-8">

    <div class="max-w-[1300px] mx-auto flex flex-col h-[calc(100vh-48px)]">
        <!-- 标题 -->
        <h1 class="text-center text-2xl font-bold text-gray-800 py-2.5" style="text-shadow: 0 1px 2px rgba(0,0,0,0.05);">
            联合实验室双周重点成果文档智能统计工具
        </h1>
        <div class="line mb-5"></div>

        <!-- 内容区 -->
        <div class="flex flex-col md:flex-row gap-5 flex-grow overflow-hidden">
            <!-- 左侧输入 -->
            <div class="panel flex-1 md:flex-5 flex flex-col p-5 md:p-[18px]" style="flex: 5;">
                <label class="text-[15px] font-bold text-gray-700 mb-3 block">📝 原始双周报文本输入</label>
                <textarea id="text_input" class="styled-textarea flex-grow" placeholder="请将完整的双周报内容粘贴到此处..."></textarea>
            </div>

            <!-- 右侧结果 -->
            <div class="panel flex-1 md:flex-5 flex flex-col p-5 md:p-[18px]" style="flex: 5;">
                <label class="text-[15px] font-bold text-gray-700 mb-3 block">📊 提取结果预览</label>
                <textarea id="result_display" class="styled-textarea flex-grow" placeholder="提取结果将在这里显示"></textarea>
            </div>
        </div>

        <!-- 按钮栏 -->
        <div class="flex flex-wrap items-center gap-3.5 mt-5">
            <button id="extract_btn" class="btn btn-blue">
                <span>🔍</span> 提取重点成果
            </button>
            <button id="export_btn" class="btn btn-green" disabled>
                <span>📄</span> 导出Word文档
            </button>
            <button id="copy_btn" class="btn btn-purple" disabled>
                <span>📋</span> 复制提取结果
            </button>
            <button id="clear_btn" class="btn btn-gray">
                <span>🧹</span> 清空全部内容
            </button>
            
            <div class="flex-grow"></div>
            
            <div id="status_label" class="text-[14px] text-gray-600 text-right">
                ⚪ 就绪
            </div>
        </div>
    </div>

    <script>
        // ===================== 核心配置 =====================
        const lab_name_mapping = {
            "结构强度和轻量化联合实验室": "大飞机结构强度和轻量化联合实验室",
            "结冰安全联合实验室": "大飞机结冰安全联合实验室",
            "电磁防护联合实验室": "大飞机电磁防护联合实验室",
            "可靠性联合实验室": "大飞机可靠性联合实验室",
            "噪声联合实验室": "大飞机噪声研究与控制联合实验室",
            "液压起落架刹车联合实验室": "大飞机液压起落架刹车联合实验室",
            "地面动力学联合实验室": "大飞机地面动力学联合实验室",
            "先进金属材料联合实验室": "大飞机先进金属材料联合实验室",
            "功能机构联合实验室项目": "大飞机功能机构联合实验室",
            "机构与传动联合实验室项目": "大飞机机构与传动联合实验室",
            "风沙联合研究中心": "大飞机风沙联合研究中心",
            "智能电网联合实验室": "大飞机智能电网联合实验室",
            "材料应用与评价联合实验室": "大飞机材料应用与评价联合实验室"
        };

        const output_order = [
            "大飞机材料应用与评价联合实验室",
            "大飞机电磁防护联合实验室",
            "大飞机地面动力学联合实验室",
            "大飞机液压起落架刹车联合实验室",
            "大飞机功能机构联合实验室",
            "大飞机可靠性联合实验室",
            "大飞机结冰安全联合实验室",
            "大飞机机构与传动联合实验室",
            "大飞机智能电网联合实验室",
            "大飞机先进金属材料联合实验室",
            "大飞机风沙联合研究中心",
            "大飞机噪声研究与控制联合实验室",
            "大飞机结构强度和轻量化联合实验室"
        ];

        // ===================== DOM 元素 =====================
        const textInput = document.getElementById('text_input');
        const resultDisplay = document.getElementById('result_display');
        const extractBtn = document.getElementById('extract_btn');
        const exportBtn = document.getElementById('export_btn');
        const copyBtn = document.getElementById('copy_btn');
        const clearBtn = document.getElementById('clear_btn');
        const statusLabel = document.getElementById('status_label');

        let achievements_dict = null;
        let preprocess_timer = null;

        // ===================== 工具函数 =====================
        function setStatus(text, color = '#4B5563') {
            statusLabel.innerText = text;
            statusLabel.style.color = color;
        }

        // 自动预处理防抖
        textInput.addEventListener('input', () => {
            clearTimeout(preprocess_timer);
            preprocess_timer = setTimeout(do_preprocess, 300);
        });

        function do_preprocess() {
            let text = textInput.value;
            if (!text) return;

            setStatus("正在预处理文本...", '#2D8CF0');

            // 预处理：统一换行符 + 去空行
            let clean_text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            let lines = clean_text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            let final_text = lines.join('\n');

            // 防止死循环：内容一样就不更新
            if (final_text !== text) {
                let cursorPos = textInput.selectionStart;
                textInput.value = final_text;
                // 尝试恢复光标位置
                textInput.setSelectionRange(cursorPos, cursorPos);
            }

            setStatus("⚪ 就绪", '#4B5563');
        }

        // ===================== 核心提取逻辑 =====================
        function extract_achievements(text) {
            let clean_text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            let lines = clean_text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            let date_pattern = /\（\s*\d+月\d+日\s*\）/;
            let lab_title_lines = [];
            
            lines.forEach((line, index) => {
                let has_weekly = line.includes("工作周报") || line.includes("双周报");
                let has_date = date_pattern.test(line);
                if (has_weekly || has_date) {
                    lab_title_lines.push({ lineNum: index, line: line });
                }
            });

            let lab_segments = [];
            for (let i = 0; i < lab_title_lines.length; i++) {
                let start = lab_title_lines[i].lineNum;
                let end = (i < lab_title_lines.length - 1) ? lab_title_lines[i+1].lineNum : lines.length;
                let lab_lines = lines.slice(start, end);
                lab_segments.push({
                    titleLine: lab_title_lines[i].line,
                    labText: lab_lines.join('\n')
                });
            }

            let lab_achievements = {};

            lab_segments.forEach(segment => {
                let lab_name = null;
                for (let raw_name in lab_name_mapping) {
                    if (segment.titleLine.includes(raw_name)) {
                        lab_name = lab_name_mapping[raw_name];
                        break;
                    }
                }

                if (!lab_name) return;

                // 匹配 "3. 双周重点工作成果..." 直到 "4." 或 "5." 或结束
                let achievement_pattern = /3\s*[.、．]\s*双周重点工作成果\s*([\s\S]*?)(?=\n\s*[45][.、．]|$)/;
                let achievement_match = segment.labText.match(achievement_pattern);

                if (!achievement_match) {
                    lab_achievements[lab_name] = "无。";
                    return;
                }

                let achievement_content = achievement_match[1].trim();
                // 匹配具体项目
                let item_pattern = /[a-zA-Z0-9）).、(]{1,3}\s*([^;\n]+?)\s*(?=\n|;|$)/g;
                let cleaned_items = [];
                let match;
                
                while ((match = item_pattern.exec(achievement_content)) !== null) {
                    let clean_item = match[1].trim().replace(/\u200B/g, '').replace(/；/g, '').replace(/。/g, '');
                    if (clean_item && !['无', '暂无', 'c', 'C'].includes(clean_item)) {
                        cleaned_items.push(clean_item);
                    }
                }

                lab_achievements[lab_name] = cleaned_items.length > 0 ? cleaned_items.join('；') + '。' : "无。";
            });

            return lab_achievements;
        }

        // ===================== 按钮事件 =====================
        extractBtn.addEventListener('click', () => {
            let raw_text = textInput.value.trim();
            if (!raw_text) {
                setStatus("🔴 请先粘贴内容", '#E53E3E');
                return;
            }

            extractBtn.disabled = true;
            copyBtn.disabled = true;
            exportBtn.disabled = true;
            resultDisplay.value = "";
            setStatus("🔵 处理中...", '#2D8CF0');

            // 使用 setTimeout 模拟异步线程，避免阻塞 UI
            setTimeout(() => {
                try {
                    let result = extract_achievements(raw_text);
                    achievements_dict = result;

                    let total = output_order.length;
                    let has_data = output_order.filter(k => result[k] && result[k] !== "无。").length;

                    let preview = [];
                    output_order.forEach((lab, idx) => {
                        preview.push(`${idx + 1}、${lab}：${result[lab] || '无。'}`);
                    });
                    
                    resultDisplay.value = preview.join("\n\n");
                    
                    extractBtn.disabled = false;
                    copyBtn.disabled = false;
                    exportBtn.disabled = false;
                    
                    setStatus(`🟢 提取完成 | 共${total}个实验室，${has_data}个有成果`, '#19BE6B');

                } catch (e) {
                    extractBtn.disabled = false;
                    setStatus("🔴 处理失败", '#E53E3E');
                    alert("提取出错：" + e.message);
                }
            }, 100);
        });

        copyBtn.addEventListener('click', () => {
            let text = resultDisplay.value;
            if (text.trim()) {
                navigator.clipboard.writeText(text).then(() => {
                    setStatus("🟢 已复制提取结果到剪贴板", '#19BE6B');
                }).catch(() => {
                    setStatus("🔴 复制失败，请手动复制", '#E53E3E');
                });
            } else {
                setStatus("🔴 无内容可复制", '#E53E3E');
            }
        });

        clearBtn.addEventListener('click', () => {
            textInput.value = "";
            resultDisplay.value = "";
            achievements_dict = null;
            exportBtn.disabled = true;
            copyBtn.disabled = true;
            setStatus("⚪ 就绪", '#4B5563');
        });

        // ===================== 导出 Word 逻辑 =====================
        exportBtn.addEventListener('click', () => {
            if (!achievements_dict) {
                setStatus("🔴 暂无结果可导出", '#E53E3E');
                return;
            }

            setStatus("🔵 正在生成Word文档...", '#2D8CF0');

            try {
                const doc = new docx.Document({
                    styles: {
                        default: {
                            document: {
                                run: {
                                    font: "宋体",
                                    size: 20 // 10pt * 2
                                }
                            }
                        }
                    },
                    sections: [{
                        properties: {},
                        children: output_order.map((lab, idx) => {
                            let achievement = achievements_dict[lab] || "无。";
                            return new docx.Paragraph({
                                spacing: { before: 0, after: 0, line: 240 }, // 1.2行距
                                children: [
                                    new docx.TextRun({
                                        text: `${idx + 1}、${lab}：`,
                                        bold: true,
                                        font: "宋体",
                                        size: 20
                                    }),
                                    new docx.TextRun({
                                        text: achievement,
                                        bold: false,
                                        font: "宋体",
                                        size: 20
                                    })
                                ]
                            });
                        })
                    }]
                });

                docx.Packer.toBlob(doc).then(blob => {
                    saveAs(blob, "双周重点成果汇总.docx");
                    setStatus("🟢 已导出Word文档", '#19BE6B');
                }).catch(err => {
                    console.error(err);
                    setStatus("🔴 导出失败", '#E53E3E');
                    alert("导出失败: " + err.message);
                });

            } catch (e) {
                setStatus("🔴 导出失败", '#E53E3E');
                alert("导出失败: " + e.message);
            }
        });
    </script>
</body>
</html>
